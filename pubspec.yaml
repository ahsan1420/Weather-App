name: weatherforcasting
description: Advanced Weather App with AI features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  google_generative_ai: ^0.4.3
  permission_handler: ^11.3.0
  intl: ^0.19.0
  native_exif: ^0.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env